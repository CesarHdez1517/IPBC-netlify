[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Netlify Identity callback (needed for Decap CMS login)
[[redirects]]
  from   = "/api/auth"
  to     = "/.netlify/identity/authorize"
  status = 302

# SPA fallback — goes LAST so static files (/admin/) take priority
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
