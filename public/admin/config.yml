# ─────────────────────────────────────────────────────────────────────────────
# FIX CRÍTICO: "name: github" requiere una OAuth App de GitHub configurada
# manualmente — no funciona con Netlify directamente.
#
# "name: git-gateway" usa Netlify Identity como autenticación,
# que es el método estándar para sitios en Netlify. Solo requiere:
#   1. Activar Identity en el dashboard de Netlify
#   2. Activar Git Gateway en Identity → Services
#   3. Invitarte como usuario desde Identity → Invite users
# ─────────────────────────────────────────────────────────────────────────────
backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

# Configuración de la interfaz del CMS
locale: "es"

collections:
  # ── Artículos ───────────────────────────────────────────────────────────────
  - name: "articulos"
    label: "Artículos"
    label_singular: "Artículo"
    folder: "src/content/articulos"
    create: true
    delete: true
    slug: "{{slug}}"
    format: "json"
    summary: "{{title}} — {{createdAt}}"
    fields:
      - label: "Título"
        name: "title"
        widget: "string"
        hint: "Aparece en la tarjeta y en la página del artículo"

      - label: "Resumen"
        name: "excerpt"
        widget: "text"
        hint: "1–2 oraciones. Aparece en la tarjeta de la lista"

      - label: "Fecha de publicación"
        name: "createdAt"
        widget: "datetime"
        format: "YYYY-MM-DDTHH:mm:ssZ"

      - label: "Imagen destacada"
        name: "imageUrl"
        widget: "image"
        required: false
        hint: "Opcional. URL o sube una imagen"

      - label: "Contenido"
        name: "content"
        widget: "markdown"
        hint: "Usa ## para subtítulos, **negrita**, > para citas bíblicas"

  # ── Videos ─────────────────────────────────────────────────────────────────
  - name: "videos"
    label: "Videos"
    label_singular: "Video"
    folder: "src/content/videos"
    create: true
    delete: true
    slug: "{{slug}}"
    format: "json"
    summary: "{{title}}"
    fields:
      - label: "Título"
        name: "title"
        widget: "string"
        hint: "Título del sermón o enseñanza"

      - label: "ID de YouTube"
        name: "youtubeId"
        widget: "string"
        hint: "Solo el ID (11 caracteres). Ej: dQw4w9WgXcQ — de la URL ?v=dQw4w9WgXcQ"
        pattern:
          - '^[a-zA-Z0-9_-]{11}$'
          - "Debe ser exactamente el ID de YouTube (11 caracteres)"

      - label: "Descripción"
        name: "description"
        widget: "text"
        required: false
        hint: "Descripción corta del video (opcional)"
