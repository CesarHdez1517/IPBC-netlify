<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Admin | IPBC</title>

    <!-- Versión estable de Decap CMS -->
    <script src="https://unpkg.com/decap-cms@3.3.0/dist/decap-cms.js"></script>
</head>
<body>
<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            if (typeof CMS !== 'undefined') {
                CMS.init();
                console.log("Decap CMS cargado correctamente");
            } else {
                console.error("Decap CMS no se pudo cargar");
            }
        }, 1000);
    });
</script>
</body>
</html>
